faqs:
  - question: "Which inburgering course actually teaches you Dutch?"
    answer: "The courses that teach Dutch you keep are the ones where finishing a lesson means using the language, not just completing exercises. Most self-paced courses such as Inburgering.org, InburgeringOnline, and InburgeringPrep train recognition, so you can pick the right answer on the exam but need to keep practicing afterward to retain it. Classroom courses like Koentact add real speaking time. DutchwithJoost completes a lesson only once you have used the new words in conversation across all four skills, so you learn by using the language rather than memorizing it."
  - question: "Will I forget Dutch after passing the inburgering exam?"
    answer: "It depends on how you learned it. If you trained mainly to recognize correct answers and memorized for the exam, that knowledge fades quickly once you stop. What sticks is the language you actually produced and used. If you practiced speaking and writing across real situations, you keep far more of it. This is why the way a course defines completion matters more than its price."
  - question: "What is the cheapest inburgering course?"
    answer: "Inburgering.org is the lowest-priced option, at roughly 60 to 120 euros total to reach A2 (from about 4.99 euros a month, as of 2026, so verify before relying on it). It follows the official exam format closely, which makes it a solid route to passing. The honest caveat: it is memorization-based, so plan to keep practicing on your own afterward if you want to keep using Dutch."
  - question: "Are expensive inburgering courses worth it?"
    answer: "It depends on what the higher price buys you. Classroom courses run roughly 500 to 2,000 euros for A2 and give you a real teacher, structure, and genuine speaking time with other people, which helps retention. The question to ask is whether the spend buys you the ability to use Dutch afterward or just more exam practice. A more expensive course is worth it when it gets you producing the language."
  - question: "Can I use the DUO loan for any inburgering course?"
    answer: "No. If you pay with a DUO loan, you must choose a school certified by Blik op Werk, which narrows your options. Self-paced courses that are not on the certified-provider list can still be excellent self-funded choices or supplements, but they are not loan-eligible. Before you compare courses, confirm your required level (A2 under the 2013 law, or B1 under the 2021 law depending on your assigned route) and your funding route."
