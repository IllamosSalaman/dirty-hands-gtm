faqs:
  - question: "Is InburgeringOnline worth it?"
    answer: "Yes, if your goal is to pass the inburgering exam. InburgeringOnline is a self-paced course mapped closely to the exam parts, and many learners pass all five exams with it. The trade-off is that it counts a lesson finished when you complete the exercises, which trains you to recognize Dutch rather than produce it. That is why some learners pass and still struggle to speak. If speaking afterward matters as much as passing, a production-based course is a better fit."
  - question: "What is the best alternative to InburgeringOnline?"
    answer: "For learners whose goal is to actually speak Dutch and not only pass the exam, a production-based course like DutchwithJoost is the closest alternative. It covers the same five exam parts, but a lesson only completes once you have used the new words in a conversation, so finishing a lesson means you can produce the language, not just recognize it."
  - question: "Will InburgeringOnline help me actually speak Dutch or just pass the exam?"
    answer: "InburgeringOnline is built to get you through the exam, and it does that well. Speaking afterward is a separate skill that comes from producing the language, not recognizing it on a screen. If you use InburgeringOnline, plan to get real speaking practice somewhere else, through a Dutch-speaking workplace, a partner, or a tutor, so you do not pass the test and still freeze in conversation."
  - question: "How much does InburgeringOnline cost for full A2 coverage?"
    answer: "Full A2 coverage on InburgeringOnline runs roughly 210 to 300 euro depending on plan length, billed monthly (about 49.95 per month month-to-month, about 34.95 per month on the 6-month plan, about 24.95 per month on the 12-month plan). The much cheaper single-module price you may see advertised covers only one part of the exam, such as reading, not the full course. Confirm current pricing on inburgeringonline.nl before you buy."
  - question: "InburgeringOnline vs DutchwithJoost: which should I choose?"
    answer: "It is a goal question, not a quality question. Choose InburgeringOnline if you want the most-recommended, exam-mapped path and your priority is passing efficiently. Choose DutchwithJoost if you have finished a course before and still cannot speak, because it only counts a lesson done once you have used the words in conversation, which is built to close the gap between passing and speaking. We make DutchwithJoost, and InburgeringOnline is a fair choice for the right reader."

