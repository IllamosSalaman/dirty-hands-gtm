faqs:
  - question: "How do I practice Dutch speaking without a partner?"
    answer: "Combine methods. Shadowing builds pronunciation. Self-recording helps you hear your gaps. Thinking in Dutch builds the habit of forming sentences. For conversation practice, look for structured options that give feedback without constantly interrupting you."

  - question: "Can I learn to speak Dutch alone?"
    answer: "You can build strong foundational skills alone. Conversation practice is harder to solve without either a patient human partner or a structured course that provides feedback naturally."

  - question: "Is ChatGPT good for Dutch speaking practice?"
    answer: "It's accessible and judgment-free, but feedback interrupts the conversation flow, there's no curriculum, and text-based tools can't hear your pronunciation. Better than no practice, but not a complete solution."

  - question: "Why doesn't my Dutch partner help me practice?"
    answer: "Level mismatch. They speak native-level Dutch while you're still learning. It's hard to have a real conversation with that gap, and they learned intuitively so they can't always explain why things work the way they do."

  - question: "What's the best way to practice Dutch at home?"
    answer: "Daily: 5-10 minutes of shadowing and thinking in Dutch. Several times weekly: conversation practice with feedback that doesn't break your flow. The key is consistency over intensity."

