  definition_paragraph: |
    Passing the inburgering exam but being unable to speak Dutch is common because most courses train recognition (picking correct answers from options) rather than production (generating sentences yourself). Your passive vocabulary (what you understand) is larger than your active vocabulary (what you can say). The solution is production-based learning where lessons complete when you use vocabulary in conversation, not when you finish exercises.

