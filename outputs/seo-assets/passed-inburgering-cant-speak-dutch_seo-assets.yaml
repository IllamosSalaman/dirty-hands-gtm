  faq_schema:
    "@type": FAQPage
    mainEntity:
      - "@type": Question
        name: "Why can't I speak Dutch after passing the inburgering exam?"
        acceptedAnswer:
          "@type": Answer
          text: "Most inburgering courses train recognition (picking correct answers) rather than production (generating sentences yourself). Passing the exam proves you can recognize Dutch patterns, not that you can produce them in conversation."

      - "@type": Question
        name: "What is the difference between recognition and production in language learning?"
        acceptedAnswer:
          "@type": Answer
          text: "Recognition is understanding language when you see or hear it. Production is creating language yourself in speech or writing. Recognition is easier and develops faster, which is why you can understand Dutch but struggle to speak it. Production practice builds both skills. Recognition practice only builds recognition."

      - "@type": Question
        name: "How can I actually learn to speak Dutch, not just pass the test?"
        acceptedAnswer:
          "@type": Answer
          text: "Choose a course where completion means you can use the vocabulary, not that you finished the exercises. Look for speaking practice integrated throughout lessons rather than added at the end. Practice producing language daily, not just before the exam."

      - "@type": Question
        name: "Do inburgering courses teach real Dutch?"
        acceptedAnswer:
          "@type": Answer
          text: "Most teach you to pass the exam, which is different from conversational ability. Courses focused on recognition build passive vocabulary. Courses focused on production build active vocabulary you can use in conversation."

      - "@type": Question
        name: "What should I look for in a Dutch course if I want to actually speak?"
        acceptedAnswer:
          "@type": Answer
          text: "Ask five questions: What counts as completing a lesson? How much speaking practice is included? When does speaking practice start? Does practice match my level? Can I practice on my own schedule?"

