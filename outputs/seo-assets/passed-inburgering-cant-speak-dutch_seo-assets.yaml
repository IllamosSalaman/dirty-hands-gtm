  faq_schema:
    "@type": FAQPage
    mainEntity:
      - "@type": Question
        name: "Why can't I speak Dutch after passing the inburgering exam?"
        acceptedAnswer:
          "@type": Answer
          text: "Most inburgering courses train recognition (picking correct answers) rather than production (generating sentences yourself). Passing the exam proves you can recognize Dutch patterns, not that you can produce them in conversation."

      - "@type": Question
        name: "What is the difference between recognition and production in language learning?"
        acceptedAnswer:
          "@type": Answer
          text: "Recognition is understanding language when you see or hear it. Production is generating language yourself in speech or writing. Recognition is easier and develops faster, which is why you can understand Dutch but struggle to speak it."

      - "@type": Question
        name: "How can I actually learn to speak Dutch, not just pass the test?"
        acceptedAnswer:
          "@type": Answer
          text: "Choose a course that requires active production for completion, not just exercise completion. Look for unlimited speaking practice, production criteria (must use vocabulary in conversation), and speaking integrated throughout lessons rather than bolted on at the end."

      - "@type": Question
        name: "Do inburgering courses teach real Dutch?"
        acceptedAnswer:
          "@type": Answer
          text: "Most teach you to pass the exam, which is different from real conversational ability. Courses focused on recognition (multiple choice, fill-in-blank) build passive vocabulary. Courses focused on production build active vocabulary you can use in conversation."

      - "@type": Question
        name: "What should I look for in a Dutch course if I want to actually speak?"
        acceptedAnswer:
          "@type": Answer
          text: "Five criteria: (1) production-based completion, not exercise-based, (2) speaking practice in every lesson, (3) unlimited practice availability, (4) conversation as proof mechanism, (5) vocabulary used in context, not isolated memorization."

