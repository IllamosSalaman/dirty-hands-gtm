faqs:
  - question: "What is the difference between recognition and production in language learning?"
    answer: "Recognition is understanding a language when you see or hear it: reading and listening, the receptive half. Production is building the language yourself: speaking and writing, the productive half. They are separate skills, and practicing one does not automatically train the other, which is why you can understand far more Dutch than you can say. Production is also the half that makes the language stick, because using a word yourself is what moves it into memory you can actually retrieve."
  - question: "Why do I forget Dutch after finishing a course?"
    answer: "Most courses count a lesson finished when you have clicked through the exercises, which mainly trains recognition, and recognition fades fastest once you stop. Re-reading and multiple-choice feel like progress because they are easy, but that ease is exactly why little of it stays. You keep the Dutch you have produced yourself, so if a course never made you speak or write the words, there is little for your memory to hold onto."
  - question: "Why can I understand Dutch but not speak it?"
    answer: "Because understanding and speaking are two different skills. Reading and listening let Dutch come in, and you can get good at those while still being unable to build a sentence on the spot. Speaking develops only when you practice producing the language yourself, out loud, in real exchanges. If your study has been mostly input, the gap you feel is expected, not a sign you are bad at languages."
  - question: "Does production-based learning help you remember Dutch longer?"
    answer: "Yes. When you learn a word by using it, speaking and writing it rather than only recognizing it, you build the retrieval pathway that memorization skips, so the word is there when you need it. Producing the language also improves how well you later understand it, so the benefit runs both ways. The practical payoff is retention: you keep what you learn instead of memorizing it for a test and losing it."
  - question: "Is production-based learning the same as project-based language learning?"
    answer: "No. Project-based language learning (PBLL) organizes study around completing a project, such as making a video or planning a trip. Production-based learning is about the completion standard for any lesson: it is finished when you have produced the language, spoken and written it, not just recognized it. The two share a search term but describe different things."

